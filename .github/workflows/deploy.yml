name: Deploy & Scrape

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper dependencies
        run: cd scraper && npm install

      - name: Run scraper
        run: cd scraper && node scrape.js

      - name: Copy events.json to public
        run: cp scraper/public/events.json public/events.json

      - name: Install app dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
